name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Read version from pom.xml
        id: version
        run: echo "version=$(mvn -q -Dexpression=project.version -DforceStdout help:evaluate)" >> "$GITHUB_OUTPUT"

      - name: Build Java 17 artifacts (default profile)
        run: mvn -B -DskipTests=false -pl hiam-velocity,hiam-paper,hiam-paper-gate -am clean package

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Java 21 artifacts (java21 profile)
        run: mvn -B -DskipTests=false -P java21 -pl hiam-velocity,hiam-paper,hiam-paper-gate -am clean package

      - name: Set up JDK 25 (experimental)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build Java 25 artifacts (java25 profile)
        run: mvn -B -DskipTests=false -P java25 -pl hiam-velocity,hiam-paper,hiam-paper-gate -am clean package
        continue-on-error: true

      - name: Create GitHub release with multi-version artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            hiam-paper/target/*java*.jar
            hiam-paper-gate/target/*java*.jar
            hiam-velocity/target/*java*.jar
