name: CI Build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build non-shaded jars
        run: mvn -B -DskipTests=false -Dshade.skip=true -pl hiam-velocity,hiam-paper,hiam-paper-gate -am package

      - name: Build shaded jars
        run: mvn -B -DskipTests=false -Dshade.skip=false -pl hiam-velocity,hiam-paper,hiam-paper-gate -am package

      - name: Upload non-shaded artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hiam-nonshaded
          path: |
            hiam-paper/target/*.jar
            hiam-paper-gate/target/*.jar
            hiam-velocity/target/*.jar
            !**/*-shaded.jar
            !**/*-sources.jar
            !**/*-javadoc.jar

      - name: Upload shaded artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hiam-shaded
          path: |
            hiam-paper/target/*-shaded.jar
            hiam-paper-gate/target/*-shaded.jar
            hiam-velocity/target/*-shaded.jar
